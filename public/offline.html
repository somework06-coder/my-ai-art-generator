<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Studio - Offline</title>
    <meta name="theme-color" content="#050505" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background-color: rgba(225, 178, 69, 0.1);
            color: #E1B245;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon svg {
            width: 40px;
            height: 40px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px 0;
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            max-width: 320px;
            margin: 0 0 32px 0;
            line-height: 1.5;
        }
        button {
            background-color: #E1B245;
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
    </div>
    <h1>You are offline</h1>
    <p>Your internet connection was lost. If you saved artworks previously, go back to view them offline in your gallery.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
